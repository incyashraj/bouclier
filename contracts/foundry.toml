[profile.default]
src      = "src"
out      = "out"
libs     = ["lib"]
test     = "test"
script   = "script"

solc          = "0.8.24"
optimizer     = true
optimizer_runs = 200
via_ir        = false

# Allow the deploy script to write deployment JSON to script/output/
fs_permissions = [
  { access = "read-write", path = "./script/output" },
]

remappings = [
  "@openzeppelin/=lib/openzeppelin-contracts/",
  "@ERC4337/=lib/account-abstraction/",
  "@modulekit/=lib/modulekit/",
  "forge-std/=lib/forge-std/src/",
]

[profile.default.fuzz]
runs = 256

[profile.default.lint]
# Silence style notes — we use plain imports and Solidity naming conventions deliberately
severity_levels = { "unaliased-plain-import" = "allow", "mixed-case-variable" = "allow", "mixed-case-function" = "allow" }

[profile.ci]
fuzz.runs = 1000

[rpc_endpoints]
base_sepolia  = "${BASE_SEPOLIA_RPC_URL}"
base_mainnet  = "${BASE_MAINNET_RPC_URL}"
arbitrum_one  = "${ARBITRUM_RPC_URL}"

[etherscan]
base_sepolia = { key = "${BASESCAN_API_KEY}", chain = 84532, url = "https://api-sepolia.basescan.org/api" }
base_mainnet = { key = "${BASESCAN_API_KEY}", chain = 8453,  url = "https://api.basescan.org/api" }
arbitrum_one = { key = "${ARBISCAN_API_KEY}", chain = 42161, url = "https://api.arbiscan.io/api" }
