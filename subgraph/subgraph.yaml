specVersion: 0.0.5
description: Bouclier AI Agent Trust Layer — on-chain event index
repository: https://github.com/bouclier/bouclier

schema:
  file: ./schema.graphql

dataSources:
  - kind: ethereum
    name: AgentRegistry
    network: base-sepolia
    source:
      address: "0x4b23841a1CD67B1489d6d84d2dCe666ddeF4CcDB"
      abi: AgentRegistry
      startBlock: 38959867
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Agent
      abis:
        - name: AgentRegistry
          file: ./abis/AgentRegistry.json
      eventHandlers:
        - event: AgentRegistered(indexed bytes32,indexed address,indexed address,string,uint48)
          handler: handleAgentRegistered
        - event: AgentStatusUpdated(indexed bytes32,uint8)
          handler: handleAgentStatusUpdated
      file: ./src/agentRegistry.ts

  - kind: ethereum
    name: RevocationRegistry
    network: base-sepolia
    source:
      address: "0x759833B7eEA1Df45ad2b2f22b56bee6CC5227270"
      abi: RevocationRegistry
      startBlock: 38959867
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - RevocationEvent
        - Agent
      abis:
        - name: RevocationRegistry
          file: ./abis/RevocationRegistry.json
      eventHandlers:
        - event: AgentRevoked(indexed bytes32,indexed address,uint8,uint48)
          handler: handleAgentRevoked
        - event: AgentReinstated(indexed bytes32,indexed address,uint48)
          handler: handleAgentReinstated
      file: ./src/revocationRegistry.ts

  - kind: ethereum
    name: PermissionVault
    network: base-sepolia
    source:
      address: "0xe0b283A4Dff684E5D700E53900e7B27279f7999F"
      abi: PermissionVault
      startBlock: 38959867
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - PermissionGrant
        - PermissionViolation
        - Agent
      abis:
        - name: PermissionVault
          file: ./abis/PermissionVault.json
      eventHandlers:
        - event: PermissionGranted(indexed bytes32,indexed bytes32,uint48)
          handler: handlePermissionGranted
        - event: PermissionRevoked(indexed bytes32,indexed address)
          handler: handlePermissionRevoked
        - event: PermissionViolation(indexed bytes32,indexed address,bytes4,string)
          handler: handlePermissionViolation
      file: ./src/permissionVault.ts

  - kind: ethereum
    name: AuditLogger
    network: base-sepolia
    source:
      address: "0x8E30A7eC6Ba7c767535b0e178e002d354F7335cE"
      abi: AuditLogger
      startBlock: 38959867
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - AuditEvent
        - Agent
      abis:
        - name: AuditLogger
          file: ./abis/AuditLogger.json
      eventHandlers:
        - event: ActionLogged(indexed bytes32,indexed bytes32,indexed address,bytes4,bool,uint48)
          handler: handleActionLogged
        - event: IPFSCIDAdded(indexed bytes32,string)
          handler: handleIPFSCIDAdded
      file: ./src/auditLogger.ts

  - kind: ethereum
    name: SpendTracker
    network: base-sepolia
    source:
      address: "0x930Eb18B9962c30b388f900ba9AE62386191cD48"
      abi: SpendTracker
      startBlock: 38959867
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - SpendRecord
        - Agent
      abis:
        - name: SpendTracker
          file: ./abis/SpendTracker.json
      eventHandlers:
        - event: SpendRecorded(indexed bytes32,uint256,uint256)
          handler: handleSpendRecorded
      file: ./src/spendTracker.ts
