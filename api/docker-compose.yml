services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - BOUCLIER_DATABASE_URL=postgresql+asyncpg://bouclier:bouclier@db:5432/bouclier
      - BOUCLIER_REDIS_URL=redis://redis:6379/0
      - BOUCLIER_DEBUG=true
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: bouclier
      POSTGRES_PASSWORD: bouclier
      POSTGRES_DB: bouclier
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bouclier"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata:
