name: Dashboard Build

on:
  push:
    branches: [main, develop]
    paths:
      - "dashboard/**"
      - ".github/workflows/dashboard-build.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "dashboard/**"

jobs:
  build:
    name: Next.js Static Export
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build (static export)
        run: npm run build

      - name: Verify all pages generated
        run: |
          PAGES=$(find out -name "index.html" | wc -l | tr -d ' ')
          echo "Generated $PAGES pages"
          if [ "$PAGES" -lt 16 ]; then
            echo "FAIL: Expected at least 16 pages, got $PAGES"
            exit 1
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-out
          path: dashboard/out/
          retention-days: 7
