name: SDK Tests

on:
  push:
    branches: [main, develop]
    paths:
      - "packages/**"
      - ".github/workflows/sdk-test.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "packages/**"

jobs:
  sdk:
    name: TypeScript SDKs
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package: [sdk, agentkit, eliza-plugin, langchain]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install
        working-directory: packages/${{ matrix.package }}

      - name: Type check
        run: bun run tsc --noEmit
        working-directory: packages/${{ matrix.package }}

      - name: Build
        run: bun run build
        working-directory: packages/${{ matrix.package }}

      - name: Test
        run: bun test
        working-directory: packages/${{ matrix.package }}
